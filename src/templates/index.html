<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MIR Image Retrieval Engine</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --secondary: #a855f7;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f1f5f9;
            --text-muted: #94a3b8;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            padding: 2rem;
            text-align: center;
            background: linear-gradient(135deg, var(--primary), var(--secondary));
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }

        h1 { margin: 0; font-weight: 600; letter-spacing: 1px; }

        .container {
            width: 90%;
            max-width: 1000px;
            margin-top: 3rem;
        }

        .search-sections {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
        }

        .card {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            transition: transform 0.3s ease;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .card:hover { transform: translateY(-5px); }

        h2 { color: var(--primary); margin-bottom: 1.5rem; }

        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 0.8rem;
            margin-bottom: 1rem;
            border-radius: 0.5rem;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 1rem;
            border: none;
            border-radius: 0.5rem;
            background: var(--primary);
            color: white;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover { background: var(--secondary); }

        #results {
            margin-top: 3rem;
            width: 100%;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1.5rem;
            padding-bottom: 3rem;
        }

        .result-item {
            background: var(--card-bg);
            border-radius: 1rem;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.05);
        }

        .result-item img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }

        .result-info {
            padding: 0.8rem;
            font-size: 0.9rem;
        }

        .score { color: var(--secondary); font-weight: bold; }
    </style>
</head>
<body>
    <header>
        <h1>MIR SEARCH ENGINE</h1>
        <p>Premium Machine & Deep Learning Retrieval</p>
    </header>

    <div class="container">
        <div class="search-sections">
            <div class="card">
                <h2>Unimodal Search</h2>
                <p class="text-muted">Query by image using Deep Learning descriptors.</p>
                <form id="unimodal-form">
                    <input type="file" name="image" accept="image/*" required>
                    <button type="submit">SEARCH IMAGES</button>
                </form>
            </div>

            <div class="card">
                <h2>Multimodal Search</h2>
                <p class="text-muted">Search using text queries (CLIP + FAISS).</p>
                <form id="multimodal-form">
                    <input type="text" name="query" placeholder="e.g. 'a red car in a park'" required>
                    <button type="submit">SEARCH BY TEXT</button>
                </form>
            </div>
        </div>

        <div id="results">
            <!-- Results will be injected here -->
        </div>
    </div>

    <script>
        document.getElementById('multimodal-form').onsubmit = async (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const response = await fetch('/search_multimodal', {
                method: 'POST',
                body: formData
            });
            const data = await response.json();
            displayResults(data);
        };

        function displayResults(results) {
            const container = document.getElementById('results');
            container.innerHTML = '';
            results.forEach(res => {
                const item = document.createElement('div');
                item.className = 'result-item';
                item.innerHTML = `
                    <img src="${res.path}" alt="result">
                    <div class="result-info">
                        <div class="score">Score: ${res.score.toFixed(4)}</div>
                        <div style="font-size: 0.7rem; color: #94a3b8;">${res.path.split('/').pop()}</div>
                    </div>
                `;
                container.appendChild(item);
            });
        }
    </script>
</body>
</html>
