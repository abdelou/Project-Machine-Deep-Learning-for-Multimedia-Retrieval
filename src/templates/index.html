<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MainWindow - MIR Engine</title>
    <style>
        :root {
            --bg: #f0f0f0;
            --border: #808080;
            --box-bg: #e0e0e0;
            --text: #000000;
        }

        body {
            font-family: "MS Sans Serif", "Tahoma", sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            overflow: hidden;
        }

        .window-title {
            background-color: #008042;
            color: white;
            padding: 3px 10px;
            font-size: 14px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .container-wrapper {
            padding: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            flex: 1;
            overflow: hidden;
        }

        .top-row {
            display: flex;
            gap: 10px;
            flex-shrink: 0;
        }

        fieldset {
            border: 2px groove #fff;
            padding: 10px;
            margin: 0;
        }

        legend {
            font-weight: bold;
            font-size: 13px;
        }

        .request-box {
            width: 120px;
            text-align: center;
        }

        .descriptor-box {
            flex: 1;
        }

        .search-box {
            flex: 2;
        }

        .rp_box {
            width: 200px;
        }

        .descriptor-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 5px;
            font-size: 13px;
        }

        .search-controls {
            display: flex;
            align-items: center;
            justify-content: space-around;
            gap: 10px;
            height: 100%;
        }

        button {
            background: #d4d0c8;
            border: 2px outset #fff;
            padding: 8px 15px;
            cursor: pointer;
            font-family: inherit;
            font-size: 13px;
        }

        button:active {
            border: 2px inset #fff;
        }

        .load-btn {
            width: 90px;
            height: 70px;
            font-weight: bold;
        }

        select {
            padding: 5px;
            font-size: 13px;
        }

        .titles-bar {
            display: flex;
            font-weight: bold;
            text-align: center;
            background: #d4d0c8;
            border: 1px solid var(--border);
            padding: 5px;
            flex-shrink: 0;
        }

        .main-display {
            display: flex;
            gap: 10px;
            flex: 1;
            min-height: 0;
            /* Important for flex child overflow */
        }

        .display-column {
            border: 1px solid var(--border);
            background: #fff;
            overflow-y: auto;
            position: relative;
        }

        .request-image {
            width: 300px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 20px;
        }

        .results-grid {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
            gap: 10px;
            padding: 15px;
            align-content: start;
        }

        .rp-curve {
            width: 450px;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            padding-top: 20px;
        }

        .request-image img,
        .rp-curve img {
            max-width: 95%;
            height: auto;
            border: 1px solid #808080;
        }

        .result-item img {
            width: 100%;
            height: auto;
            border: 1px solid #ccc;
        }

        .footer {
            display: flex;
            align-items: center;
            gap: 10px;
            border: 1px solid var(--border);
            padding: 5px;
            background: #d4d0c8;
        }

        progress {
            flex: 1;
            height: 20px;
        }

        .quit-btn {
            width: 100px;
        }

        label {
            font-size: 12px;
        }
    </style>
</head>

<body>
    <div class="window-title">
        <span>MainWindow</span>
        <span>X</span>
    </div>

    <div class="container-wrapper">
        <form id="mir-form">
            <div class="top-row">
                <fieldset class="request-box">
                    <legend>Request</legend>
                    <input type="file" id="image-input" name="image" style="display:none" accept="image/*">
                    <button type="button" class="load-btn" onclick="document.getElementById('image-input').click()">Load</button>
                </fieldset>
    
                <fieldset class="descriptor-box">
                    <legend>Choice of descriptor</legend>
                    <div class="descriptor-grid">
                        <label><input type="checkbox" name="descriptor" value="BGR"> BGR</label>
                        <label><input type="checkbox" name="descriptor" value="HSV"> HSV</label>
                        <label><input type="checkbox" name="descriptor" value="HOG"> HOG</label>
                        <label><input type="checkbox" name="descriptor" value="SIFT"> SIFT</label>
                        <label><input type="checkbox" name="descriptor" value="ORB"> ORB</label>
                        <label><input type="checkbox" name="descriptor" value="Mom"> Mom.</label>
                        <label><input type="checkbox" name="descriptor" value="LBP"> LBP</label>
                        <label><input type="checkbox" name="descriptor" value="GLCM"> GLCM</label>
                        <label><input type="checkbox" name="descriptor" value="ViT" checked> ViT</label>
                    </div>
                </fieldset>
    
                <fieldset class="search-box">
                    <legend>Search</legend>
                    <div class="search-controls">
                        <button type="button">Load descriptors</button>
                        <label>Distance :</label>
                        <select name="distance">
                            <option value="Euclidienne">Euclidienne</option>
                            <option value="Chicarre">Chi-square</option>
                            <option value="Bhattacharyya">Bhattacharyya</option>
                            <option value="Flann">Flann</option>
                            <option value="Brute force">Brute force</option>
                            <option value="Intersection">Intersection</option>
                            <option value="Correlation">Correlation</option>
                        </select>
                        <button type="submit">Search</button>
                    </div>
                </fieldset>
    
                <fieldset class="rp_box">
                    <legend>Recall/Precision</legend>
                    <button type="button" style="width:100%" id="compute-rp-btn">Compute R/P Curve</button>
                </fieldset>
            </div>
    
            <div class="titles-bar">
                <div style="width:300px">Request Image</div>
                <div style="flex:1">Results</div>
                <div style="width:450px">R/P Curve</div>
            </div>
    
            <div class="main-display">
                <div class="display-column request-image">
                    <img id="preview" src="" alt="Label">
                </div>
                <div class="display-column results-grid" id="results">
                    <!-- GridLayout equivalent -->
                </div>
                <div class="display-column rp-curve">
                    <img id="pr-curve" src="" alt="Label">
                </div>
            </div>
    
            <div class="footer">
                <label>ProgressBar</label>
                <progress value="0" max="100" id="progress"></progress>
                <span>0%</span>
                <button type="button" class="quit-btn" onclick="window.close()">Quit</button>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('mir-form');
        const imageInput = document.getElementById('image-input');
        const preview = document.getElementById('preview');
        const results = document.getElementById('results');
        const prCurve = document.getElementById('pr-curve');
        const progress = document.getElementById('progress');

        imageInput.onchange = (e) => {
            const file = e.target.files[0];
            if (file) {
                preview.src = URL.createObjectURL(file);
            }
        };

        let lastPRData = null;

        form.onsubmit = async (e) => {
            e.preventDefault();
            results.innerHTML = '<div style="grid-column: 1/-1; text-align: center; padding: 20px;">Searching...</div>';
            progress.value = 50;

            const formData = new FormData(form);
            const selectedDescs = Array.from(document.querySelectorAll('input[name="descriptor"]:checked')).map(cb => cb.value);
            formData.delete('descriptor');
            formData.append('descriptor', selectedDescs[0] || 'ViT');

            try {
                const response = await fetch('/search_unimodal', {
                    method: 'POST',
                    body: formData
                });
                const data = await response.json();
                
                results.innerHTML = '';
                if (data.error) {
                    results.innerHTML = `<div style="grid-column: 1/-1; color: red;">${data.error}</div>`;
                    return;
                }

                (data.results || data).forEach(res => {
                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `<img src="${res.path}" title="Score: ${res.score.toFixed(4)}" style="cursor:pointer" onclick="window.open(this.src)">`;
                    results.appendChild(div);
                });

                if (data.pr_curve) {
                    lastPRData = data.pr_curve;
                }
                progress.value = 100;
            } catch (err) {
                results.innerHTML = '<div style="grid-column: 1/-1;">Error searching.</div>';
            }
        };

        document.getElementById('compute-rp-btn').onclick = () => {
            if (lastPRData) {
                prCurve.src = `data:image/png;base64,${lastPRData}`;
                progress.value = 100;
            } else {
                alert('Please run a search first to generate data.');
            }
        };

    </script>
</body>

</html>
